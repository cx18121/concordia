<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="#3FE9D2"/>
      <stop offset="1" stop-color="#0FA896"/>
    </linearGradient>
  </defs>
  <!-- brand tile: rounded square w/ teal gradient, matching app .mark (9/30 corner ratio) -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#tile)"/>
  <!-- faint top highlight (mirrors the inset white box-shadow in the app) -->
  <rect x="6" y="6" width="500" height="500" rx="116" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="3"/>
  <!-- consensus-network mark, dark teal, scaled from the app's 24x24 viewBox -->
  <svg x="116" y="116" width="280" height="280" viewBox="0 0 24 24"
       fill="none" stroke="#04201C" stroke-linecap="round" stroke-linejoin="round">
    <g stroke-width="1.4">
      <line x1="12" y1="12" x2="12" y2="4.5"/>
      <line x1="12" y1="12" x2="18.5" y2="8.25"/>
      <line x1="12" y1="12" x2="18.5" y2="15.75"/>
      <line x1="12" y1="12" x2="12" y2="19.5"/>
      <line x1="12" y1="12" x2="5.5" y2="15.75"/>
      <line x1="12" y1="12" x2="5.5" y2="8.25"/>
      <polyline points="18.5,8.25 12,4.5 5.5,8.25 5.5,15.75 12,19.5 18.5,15.75" fill="none"/>
    </g>
    <g fill="#04201C" stroke="none">
      <circle cx="12" cy="4.5" r="2.3"/>
      <circle cx="18.5" cy="8.25" r="2.3"/>
      <circle cx="18.5" cy="15.75" r="2.3"/>
      <circle cx="12" cy="19.5" r="2.3"/>
      <circle cx="5.5" cy="15.75" r="2.3"/>
      <circle cx="5.5" cy="8.25" r="2.3"/>
      <circle cx="12" cy="12" r="3.4"/>
    </g>
  </svg>
</svg>
