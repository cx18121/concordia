<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  :root{ --teal:#2DD4BF; --bright:#3FE9D2; --deep:#14B8A6; --ink:#04201C; }
  html,body{ width:1200px; height:420px; }
  .banner{
    position:relative; width:1200px; height:420px; overflow:hidden;
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(110% 130% at 16% 6%, rgba(45,212,191,.17), transparent 52%),
      radial-gradient(80% 120% at 96% 96%, rgba(56,134,221,.10), transparent 58%),
      linear-gradient(135deg,#070b10 0%, #0a1217 58%, #090f14 100%);
  }
  /* faint grid, masked to fade out */
  .banner::before{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:36px 36px;
    -webkit-mask-image: radial-gradient(120% 100% at 28% 36%, #000 22%, transparent 78%);
            mask-image: radial-gradient(120% 100% at 28% 36%, #000 22%, transparent 78%);
  }
  /* top accent hairline */
  .accent{ position:absolute; left:0; right:0; top:0; height:3px;
    background:linear-gradient(90deg, transparent, rgba(45,212,191,.85) 22%, rgba(63,233,210,.9) 50%, rgba(45,212,191,.85) 78%, transparent); }

  .left{ position:absolute; left:60px; top:0; bottom:0; width:580px;
    display:flex; flex-direction:column; justify-content:center; z-index:3; }
  .brandrow{ display:flex; align-items:center; gap:20px; margin-bottom:30px; }
  .tile{ width:78px; height:78px; border-radius:21px; flex:none;
    background:linear-gradient(150deg, var(--bright), var(--deep));
    display:grid; place-items:center;
    box-shadow:0 14px 34px -10px rgba(45,212,191,.55), inset 0 1.5px 0 rgba(255,255,255,.45); }
  .tile svg{ width:48px; height:48px; }
  .wordmark{ font-family:'Outfit'; font-weight:800; font-size:66px; line-height:.9;
    color:#F4F7FA; letter-spacing:-.025em; }
  .tagline{ font-family:'Outfit'; font-weight:600; font-size:26px; line-height:1.3;
    color:#d4ebe6; max-width:540px; letter-spacing:-.012em; }
  .tagline b{ color:var(--bright); font-weight:700; }
  .meta{ display:flex; gap:11px; margin-top:34px; }
  .chip{ font-size:13px; font-weight:600; letter-spacing:.01em; padding:8px 15px; border-radius:999px;
    color:#9fb6b1; border:1px solid rgba(45,212,191,.24); background:rgba(45,212,191,.06); white-space:nowrap; }
  .chip.solid{ color:var(--ink); background:linear-gradient(150deg,var(--bright),var(--deep)); border-color:transparent;
    box-shadow:0 6px 18px -8px rgba(45,212,191,.55); }

  /* chart motif, right */
  .right{ position:absolute; right:54px; top:0; bottom:0; width:480px; z-index:2;
    display:flex; align-items:center; }
  .chartcard{ position:relative; width:470px; height:288px;
    border-radius:20px; padding:22px 22px 16px;
    background:linear-gradient(160deg, rgba(20,28,34,.66), rgba(10,16,20,.5));
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 30px 60px -30px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06); }
  .legend{ display:flex; align-items:center; gap:18px; margin-bottom:6px; }
  .lg{ display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:#aebbc4; }
  .dot{ width:9px; height:9px; border-radius:50%; }
  .dot.t{ background:var(--bright); box-shadow:0 0 8px rgba(63,233,210,.8); }
  .dash{ width:16px; height:0; border-top:2px dashed #7e8a96; }
  .alpha{ position:absolute; right:22px; top:20px; font-size:12px; font-weight:700; color:var(--ink);
    background:linear-gradient(150deg,var(--bright),var(--deep)); padding:5px 10px; border-radius:8px; letter-spacing:.01em; }
  .cap{ position:absolute; left:22px; bottom:14px; font-size:11.5px; color:#76838d; font-weight:500; letter-spacing:.02em; }
</style>
</head>
<body>
  <div class="banner">
    <div class="accent"></div>

    <div class="left">
      <div class="brandrow">
        <div class="tile">
          <svg viewBox="0 0 24 24">
            <g fill="none" stroke="#04201C" stroke-width="1.4" stroke-linecap="round">
              <line x1="12" y1="12" x2="12" y2="4.5"/>
              <line x1="12" y1="12" x2="18.5" y2="8.25"/>
              <line x1="12" y1="12" x2="18.5" y2="15.75"/>
              <line x1="12" y1="12" x2="12" y2="19.5"/>
              <line x1="12" y1="12" x2="5.5" y2="15.75"/>
              <line x1="12" y1="12" x2="5.5" y2="8.25"/>
              <polyline points="18.5,8.25 12,4.5 5.5,8.25 5.5,15.75 12,19.5 18.5,15.75"/>
            </g>
            <g fill="#04201C">
              <circle cx="12" cy="4.5" r="2.3"/><circle cx="18.5" cy="8.25" r="2.3"/>
              <circle cx="18.5" cy="15.75" r="2.3"/><circle cx="12" cy="19.5" r="2.3"/>
              <circle cx="5.5" cy="15.75" r="2.3"/><circle cx="5.5" cy="8.25" r="2.3"/>
              <circle cx="12" cy="12" r="3.4"/>
            </g>
          </svg>
        </div>
        <div class="wordmark">Concordia</div>
      </div>
      <div class="tagline"><b>Skill</b>, not just capital, decides<br>where the money goes.</div>
      <div class="meta">
        <span class="chip solid">Community hedge fund</span>
        <span class="chip">Base Sepolia</span>
        <span class="chip">ETHGlobal NY 2026</span>
      </div>
    </div>

    <div class="right">
      <div class="chartcard">
        <div class="legend">
          <span class="lg"><span class="dot t"></span>Fund</span>
          <span class="lg"><span class="dash"></span>S&amp;P 500</span>
        </div>
        <span class="alpha">▲ outperforming</span>
        <svg width="426" height="210" viewBox="0 0 426 210" fill="none">
          <defs>
            <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#2DD4BF" stop-opacity=".30"/>
              <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
            </linearGradient>
            <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3.5"/>
            </filter>
          </defs>
          <!-- baseline grid -->
          <g stroke="rgba(255,255,255,.05)" stroke-width="1">
            <line x1="6" y1="50" x2="420" y2="50"/>
            <line x1="6" y1="100" x2="420" y2="100"/>
            <line x1="6" y1="150" x2="420" y2="150"/>
          </g>
          <!-- fund area -->
          <polygon fill="url(#area)"
            points="10,150 45,142 80,146 115,126 150,132 185,108 220,116 255,92 290,98 325,72 360,66 398,48 418,40 418,196 10,196"/>
          <!-- S&P dashed -->
          <polyline stroke="#7e8a96" stroke-width="2.4" stroke-dasharray="6 6" stroke-linecap="round" stroke-linejoin="round"
            points="10,162 45,159 80,164 115,150 150,156 185,143 220,150 255,135 290,140 325,124 360,127 398,112 418,106"/>
          <!-- fund glow + line -->
          <polyline stroke="#2DD4BF" stroke-width="5" opacity=".5" filter="url(#g)" fill="none" stroke-linecap="round" stroke-linejoin="round"
            points="10,150 45,142 80,146 115,126 150,132 185,108 220,116 255,92 290,98 325,72 360,66 398,48 418,40"/>
          <polyline stroke="#3FE9D2" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"
            points="10,150 45,142 80,146 115,126 150,132 185,108 220,116 255,92 290,98 325,72 360,66 398,48 418,40"/>
          <circle cx="418" cy="40" r="6.5" fill="#3FE9D2"/>
          <circle cx="418" cy="40" r="11" fill="#3FE9D2" opacity=".25"/>
        </svg>
        <span class="cap">Fund NAV vs benchmark · replayed 12-week track record</span>
      </div>
    </div>
  </div>
</body>
</html>
