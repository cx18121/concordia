<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b10"/>
      <stop offset="1" stop-color="#0a1016"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.44">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="#3FE9D2"/>
      <stop offset="1" stop-color="#0FA896"/>
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow)"/>

  <!-- mark tile, centered -->
  <g transform="translate(282,66)">
    <rect x="0" y="0" width="76" height="76" rx="22" fill="url(#tile)"/>
    <svg x="15" y="15" width="46" height="46" viewBox="0 0 24 24"
         fill="none" stroke="#04201C" stroke-linecap="round" stroke-linejoin="round">
      <g stroke-width="1.4">
        <line x1="12" y1="12" x2="12" y2="4.5"/>
        <line x1="12" y1="12" x2="18.5" y2="8.25"/>
        <line x1="12" y1="12" x2="18.5" y2="15.75"/>
        <line x1="12" y1="12" x2="12" y2="19.5"/>
        <line x1="12" y1="12" x2="5.5" y2="15.75"/>
        <line x1="12" y1="12" x2="5.5" y2="8.25"/>
        <polyline points="18.5,8.25 12,4.5 5.5,8.25 5.5,15.75 12,19.5 18.5,15.75" fill="none"/>
      </g>
      <g fill="#04201C" stroke="none">
        <circle cx="12" cy="4.5" r="2.3"/>
        <circle cx="18.5" cy="8.25" r="2.3"/>
        <circle cx="18.5" cy="15.75" r="2.3"/>
        <circle cx="12" cy="19.5" r="2.3"/>
        <circle cx="5.5" cy="15.75" r="2.3"/>
        <circle cx="5.5" cy="8.25" r="2.3"/>
        <circle cx="12" cy="12" r="3.4"/>
      </g>
    </svg>
  </g>

  <!-- wordmark, big -->
  <text x="320" y="218" text-anchor="middle" font-family="Outfit" font-weight="700"
        font-size="50" fill="#f4f7fa" letter-spacing="0.5">Concordia</text>

  <!-- descriptor -->
  <text x="320" y="254" text-anchor="middle" font-family="Outfit" font-weight="600"
        font-size="19" fill="#2dd4bf" letter-spacing="0.4">A community hedge fund</text>

  <!-- single pitch line -->
  <text x="320" y="290" text-anchor="middle" font-family="Outfit" font-weight="500"
        font-size="13.5" fill="#8b97a4" letter-spacing="0.2">Pool USDC and vote weekly, earning voting power from capital and proven accuracy.</text>
</svg>
